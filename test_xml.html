<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
</head>

<body>
    <h1>XML Test</h1>
    <div id="out"></div>
    <script>
        const xmlStr = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Sample Generator" xmlns="http://www.topografix.com/GPX/1/1">
  <wpt lat="25.033" lon="121.564"><name>Taipei 101</name></wpt>
  <wpt lat="22.627" lon="120.301"><name>Kaohsiung 85 Sky Tower</name></wpt>
  <wpt lat="24.136" lon="120.685"><name>Taichung Park</name></wpt>
  <wpt lat="22.999" lon="120.212"><name>Tainan Confucius Temple</name></wpt>
  <wpt lat="24.813" lon="120.967"><name>Hsinchu City God Temple</name></wpt>
</gpx>`;

        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlStr, "text/xml");

        let out = "";

        out += "Strict tag name 'wpt': " + doc.getElementsByTagName('wpt').length + "<br/>";
        out += "Namespace wildcard '*','wpt': " + doc.getElementsByTagNameNS('*', 'wpt').length + "<br/>";
        out += "Wildcard localName: " + Array.from(doc.querySelectorAll('*')).filter(el => el.localName === 'wpt').length + "<br/>";

        document.getElementById("out").innerHTML = out;
        console.log(out);
    </script>
</body>

</html>
